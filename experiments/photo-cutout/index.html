<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Photo Cutout Hover Prototype</title>
  <link rel="stylesheet" href="./photo-cutout.css">
  <script src="./photo-cutout.js" defer></script>
</head>
<body>
  <main class="demo-shell" aria-label="Photo cutout hover prototype">
    <section class="photo-stage" aria-label="Interactive photo scene">
      <img class="base-photo" src="/assets/images/photo-cutout-upscaled.jpg" alt="A person writing at a desk with an iMac and a large framed portrait behind them.">

      <a
        class="cutout cutout-imac"
        href="/cv/"
        aria-label="Portfolio"
        data-title="Portfolio"
        data-copy="A polished doorway into selected projects, process notes, and the work that should be easy to find first."
      >
        <img src="/assets/images/photo-cutout-upscaled.jpg" alt="">
      </a>

      <a
        class="cutout cutout-photo"
        href="/curiosities/"
        aria-label="Photography"
        data-title="Photography"
        data-copy="A visual archive for images, references, places, textures, and the quieter things that shape the work."
      >
        <img src="/assets/images/photo-cutout-upscaled.jpg" alt="">
      </a>

      <svg class="cutout-outlines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <polygon class="outline-shape outline-imac" points="7.6,34.9 29.8,34.9 35.3,42.2 34.1,52.1 22.6,52.1 19.1,60.2 9.5,57.3"></polygon>
        <polygon class="outline-shape outline-photo" points="31.9,3.5 70.9,3.5 70.7,39.7 32.7,39.7"></polygon>
      </svg>

      <aside class="hover-note is-idle" aria-live="polite">
        <p class="hover-note__eyebrow">hovering</p>
        <h1 id="hover-title">Photo prototype</h1>
        <p id="hover-copy">Move over the iMac or the framed image to test the cut-out glow treatment.</p>
      </aside>
    </section>
  </main>
</body>
</html>
